x-hf-cache-env: &hf-cache-env
    HF_HOME: /data/huggingface
    HUGGINGFACE_HUB_CACHE: /data/huggingface/hub

x-hf-cache-volume: &hf-cache-volume ./.cache/huggingface:/data/huggingface

x-gpu-reservation: &gpu-reservation
    deploy:
        resources:
            reservations:
                devices:
                    - driver: nvidia
                      count: 1
                      capabilities: [ gpu ]

networks:
    rag-net:
        driver: bridge

volumes:
    qdrant_storage:
    open-webui:

services:
    qdrant:
        image: qdrant/qdrant:v1.17.0
        hostname: qdrant
        ports:
            - "6333:6333"
            - "6334:6334"
        volumes:
            - qdrant_storage:/qdrant/storage
        networks:
            - rag-net
        healthcheck:
            test: [ "CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    inference:
        <<: *gpu-reservation
        build:
            context: .
            dockerfile: infra/docker/app.gpu.Dockerfile
        hostname: inference
        ports:
            - "8001:8001"
        environment:
            HF_TOKEN: ${HF_TOKEN}
            PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
            <<: *hf-cache-env
        volumes:
            - *hf-cache-volume
            - ./services/inference:/app
        command: uvicorn inference_app:app --host 0.0.0.0 --port 8001 --reload
        networks:
            - rag-net
        healthcheck:
            test:
                [
                    "CMD",
                    "python",
                    "-c",
                    "import urllib.request;
                      urllib.request.urlopen('http://localhost:8001/health')",
                ]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 120s

    llm:
        <<: *gpu-reservation
        image: vllm/vllm-openai:v0.18.0-x86_64-cu130
        hostname: llm
        ipc: host
        ports:
            - "8004:8004"
        environment:
            HF_TOKEN: ${HF_TOKEN}
            VLLM_WORKER_MULTIPROC_METHOD: spawn
        volumes:
            - *hf-cache-volume
        command:
            - --host
            - 0.0.0.0
            - --port
            - "8004"
            - --model
            - ${LLM__MODEL}
            - --served-model-name
            - ${LLM__MODEL}
            - --gpu-memory-utilization
            - ${VLLM_LLM_GPU_MEMORY_UTILIZATION:-0.90}
            - --max-model-len
            - ${VLLM_LLM_MAX_MODEL_LEN:-8192}
        networks:
            - rag-net
        healthcheck:
            test: [ "CMD", "curl", "-fsS", "http://localhost:8004/health" ]
            interval: 20s
            timeout: 10s
            retries: 5
            start_period: 240s

    orchestrator:
        build:
            context: .
            dockerfile: infra/docker/app.cpu.Dockerfile
        hostname: orchestrator
        ports:
            - "8000:8000"
        env_file:
            - .env
        volumes:
            - ./api:/app
        command: uvicorn orchestrator.main:app --host 0.0.0.0 --port 8000 --reload
        networks:
            - rag-net
        depends_on:
            qdrant:
                condition: service_healthy
            inference:
                condition: service_healthy
            llm:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD",
                    "python",
                    "-c",
                    "import urllib.request;
                      urllib.request.urlopen('http://localhost:8000/health')",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 15s

    webui:
        image: ghcr.io/open-webui/open-webui:v0.8.10
        hostname: webui
        ports:
            - "8080:8080"
        environment:
            OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-http://orchestrator:8000/v1}
            OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy}
            ENABLE_RAG_WEB_SEARCH: "false"
            ENABLE_IMAGE_GENERATION: "false"
            ENABLE_AUDIO: "false"
            WEBUI_AUTH: "true"
            ENABLE_SIGNUP: "true"
            ENABLE_LOGIN_FORM: "true"
            DEFAULT_MODELS: ${WEBUI_DEFAULT_MODELS:-Multimodal-Economic-RAG}
            WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-admin}
            ENABLE_FOLLOW_UP_GENERATION: "false"
            ENABLE_TITLE_GENERATION: "false"
            ENABLE_TAGS_GENERATION: "false"
        volumes:
            - open-webui:/app/backend/data
        networks:
            - rag-net
        depends_on:
            orchestrator:
                condition: service_healthy

    tunnel:
        image: cloudflare/cloudflared:2026.3.0
        hostname: tunnel
        pull_policy: always
        command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
        networks:
            - rag-net
        depends_on:
            - webui
        restart: unless-stopped

    ingest:
        build:
            context: .
            dockerfile: infra/docker/app.cpu.Dockerfile
        environment:
            SERVICES__INFERENCE_URL: ${SERVICES__INFERENCE_URL}
            SERVICES__QDRANT_URL: ${SERVICES__QDRANT_URL}
            SERVICES__QDRANT_COLLECTION: ${SERVICES__QDRANT_COLLECTION}
            INGEST__BATCH_SIZE: ${INGEST__BATCH_SIZE}
            HF_TOKEN: ${HF_TOKEN}
            <<: *hf-cache-env
        volumes:
            - *hf-cache-volume
            - ./scripts:/app
        command: python ingest.py
        networks:
            - rag-net
        depends_on:
            qdrant:
                condition: service_healthy
            inference:
                condition: service_healthy
        profiles:
            - ingest
