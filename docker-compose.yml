networks:
  rag-net:
    driver: bridge

volumes:
  qdrant_storage:
  open-webui:

services:
  # === Qdrant Vector Database ===
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - rag-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # === Embedding Service (GPU) ===
  embedding:
    build:
      context: ./services/embedding
    ports:
      - "8001:8001"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    networks:
      - rag-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  # === Reranker Service (GPU) ===
  reranker:
    build:
      context: ./services/reranker
    ports:
      - "8002:8002"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    networks:
      - rag-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  # === Guard Service (GPU) ===
  guard:
    build:
      context: ./services/guard
    ports:
      - "8003:8003"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    networks:
      - rag-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  # === FastAPI Orchestrator ===
  orchestrator:
    build:
      context: ./orchestrator
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - rag-net
    depends_on:
      qdrant:
        condition: service_healthy
      embedding:
        condition: service_healthy
      reranker:
        condition: service_healthy
      guard:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # === Open WebUI ===
  webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-http://orchestrator:8000/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-dummy}
      - ENABLE_RAG_WEB_SEARCH=false
      - ENABLE_IMAGE_GENERATION=false
      - WEBUI_AUTH=${WEBUI_AUTH:-false}
      - DEFAULT_MODELS=multimodal-rag
    volumes:
      - open-webui:/app/backend/data
    networks:
      - rag-net
    depends_on:
      orchestrator:
        condition: service_healthy

  # === Cloudflare Tunnel ===
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.yml --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    volumes:
      - ./tunnel/config.yml:/etc/cloudflared/config.yml:ro
    networks:
      - rag-net
    depends_on:
      - webui
    restart: unless-stopped

  # === Ingestion Script (run manually) ===
  ingest:
    build:
      context: ./scripts
    environment:
      - EMBEDDING_URL=http://embedding:8001
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-econ_vn_news}
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    networks:
      - rag-net
    depends_on:
      qdrant:
        condition: service_healthy
      embedding:
        condition: service_healthy
    profiles:
      - ingest

  # === ASR Service (future — GPU) ===
