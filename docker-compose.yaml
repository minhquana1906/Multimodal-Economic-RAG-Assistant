x-hf-cache-env: &hf-cache-env
    HF_HOME: /data/huggingface
    HUGGINGFACE_HUB_CACHE: /data/huggingface/hub

x-gpu-0: &gpu-0
    deploy:
        resources:
            reservations:
                devices:
                    - driver: nvidia
                      device_ids: ['0']
                      capabilities: [gpu]

x-gpu-1: &gpu-1
    deploy:
        resources:
            reservations:
                devices:
                    - driver: nvidia
                      device_ids: ['1']
                      capabilities: [gpu]

networks:
    rag-net:
        driver: bridge

volumes:
    hf_cache:
    qdrant_storage:
    open-webui:

services:
    qdrant:
        image: qdrant/qdrant:v1.17.0
        hostname: qdrant
        pull_policy: always
        ports:
            - '6333:6333'
            - '6334:6334'
        volumes:
            - qdrant_storage:/qdrant/storage
        networks:
            - rag-net
        healthcheck:
            test:
                ['CMD-SHELL', "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    inference:
        <<: *gpu-0
        build:
            context: .
            dockerfile: infra/docker/app.gpu.Dockerfile
        image: ${DOCKERHUB_NAMESPACE:?set DOCKERHUB_NAMESPACE}/eco-rag-inference:${IMAGE_TAG:-latest}
        hostname: inference
        pull_policy: always
        ports:
            - '8001:8001'
        environment:
            HF_TOKEN: ${HF_TOKEN}
            HF_HUB_ETAG_TIMEOUT: ${HF_HUB_ETAG_TIMEOUT:-120}
            HF_HUB_DOWNLOAD_TIMEOUT: ${HF_HUB_DOWNLOAD_TIMEOUT:-120}
            PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
            <<: *hf-cache-env
        volumes:
            - hf_cache:/data/huggingface
        command: uvicorn inference_app:app --host 0.0.0.0 --port 8001
        networks:
            - rag-net
        restart: unless-stopped
        healthcheck:
            test:
                [
                    'CMD',
                    'python3',
                    '-c',
                    "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 300s

    llm:
        <<: *gpu-1
        image: vllm/vllm-openai:v0.18.0-x86_64-cu130
        hostname: llm
        pull_policy: always
        ipc: host
        ports:
            - '8004:8004'
        environment:
            HF_TOKEN: ${HF_TOKEN}
            VLLM_WORKER_MULTIPROC_METHOD: spawn
        volumes:
            - hf_cache:/root/.cache/huggingface
        command:
            - --host
            - 0.0.0.0
            - --port
            - '8004'
            - --model
            - ${LLM__MODEL}
            - --served-model-name
            - ${LLM__MODEL}
            - --gpu-memory-utilization
            - ${VLLM_LLM_GPU_MEMORY_UTILIZATION}
            - --max-model-len
            - ${VLLM_LLM_MAX_MODEL_LEN}
        networks:
            - rag-net
        healthcheck:
            test: ['CMD', 'curl', '-fsS', 'http://localhost:8004/health']
            interval: 20s
            timeout: 10s
            retries: 5
            start_period: 240s

    orchestrator:
        build:
            context: .
            dockerfile: infra/docker/app.cpu.Dockerfile
        image: ${DOCKERHUB_NAMESPACE:?set DOCKERHUB_NAMESPACE}/eco-rag-orchestrator:${IMAGE_TAG:-latest}
        hostname: orchestrator
        pull_policy: always
        ports:
            - '8000:8000'
        env_file:
            - .env
        environment:
            LLM__URL: ${LLM__URL}
            LLM__MODEL: ${LLM__MODEL}
        command: uvicorn orchestrator.main:app --host 0.0.0.0 --port 8000
        networks:
            - rag-net
        depends_on:
            qdrant:
                condition: service_healthy
            inference:
                condition: service_healthy
            llm:
                condition: service_healthy
        healthcheck:
            test:
                [
                    'CMD',
                    'python3',
                    '-c',
                    "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 15s

    webui:
        image: ghcr.io/open-webui/open-webui:v0.8.10
        hostname: webui
        pull_policy: always
        ports:
            - '8080:8080'
        environment:
            OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-http://orchestrator:8000/v1}
            OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy}
            AUDIO_STT_ENGINE: ${AUDIO_STT_ENGINE:-openai}
            AUDIO_STT_OPENAI_API_BASE_URL: ${AUDIO_STT_OPENAI_API_BASE_URL:-http://orchestrator:8000/v1}
            AUDIO_STT_OPENAI_API_KEY: ${AUDIO_STT_OPENAI_API_KEY:-dummy}
            AUDIO_STT_MODEL: ${AUDIO_STT_MODEL:-whisper-1}
            AUDIO_TTS_ENGINE: ${AUDIO_TTS_ENGINE:-openai}
            AUDIO_TTS_OPENAI_API_BASE_URL: ${AUDIO_TTS_OPENAI_API_BASE_URL:-http://orchestrator:8000/v1}
            AUDIO_TTS_OPENAI_API_KEY: ${AUDIO_TTS_OPENAI_API_KEY:-dummy}
            AUDIO_TTS_MODEL: ${AUDIO_TTS_MODEL:-tts-1}
            AUDIO_TTS_VOICE: ${AUDIO_TTS_VOICE:-alloy}
            ENABLE_RAG_WEB_SEARCH: 'false'
            ENABLE_IMAGE_GENERATION: 'false'
            WEBUI_AUTH: 'true'
            ENABLE_SIGNUP: 'true'
            ENABLE_LOGIN_FORM: 'true'
            ENABLE_TAGS_GENERATION: 'false'
            ENABLE_FOLLOW_UP_GENERATION: 'false'
            ENABLE_TITLE_GENERATION: 'false'
            DEFAULT_MODELS: ${WEBUI_DEFAULT_MODELS:-Multimodal-Economic-RAG}
            WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-admin}
        volumes:
            - open-webui:/app/backend/data
        networks:
            - rag-net
        depends_on:
            orchestrator:
                condition: service_healthy

    tunnel:
        image: cloudflare/cloudflared:2026.3.0
        hostname: tunnel
        pull_policy: always
        command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
        networks:
            - rag-net
        depends_on:
            - webui
        restart: unless-stopped

    ingest:
        build:
            context: .
            dockerfile: infra/docker/app.cpu.Dockerfile
        image: ${DOCKERHUB_NAMESPACE:?set DOCKERHUB_NAMESPACE}/eco-rag-ingest:${IMAGE_TAG:-latest}
        pull_policy: always
        environment:
            SERVICES__INFERENCE_URL: ${SERVICES__INFERENCE_URL}
            SERVICES__QDRANT_URL: ${SERVICES__QDRANT_URL}
            SERVICES__QDRANT_COLLECTION: ${SERVICES__QDRANT_COLLECTION}
            INGEST__BATCH_SIZE: ${INGEST__BATCH_SIZE}
            HF_TOKEN: ${HF_TOKEN}
            <<: *hf-cache-env
        volumes:
            - hf_cache:/data/huggingface
        command: python ingest.py
        networks:
            - rag-net
        depends_on:
            qdrant:
                condition: service_healthy
            inference:
                condition: service_healthy
        profiles:
            - ingest
