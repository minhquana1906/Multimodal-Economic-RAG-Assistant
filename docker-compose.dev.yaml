x-hf-cache-env: &hf-cache-env
    HF_HOME: /data/huggingface
    HUGGINGFACE_HUB_CACHE: /data/huggingface/hub

x-hf-cache-volume: &hf-cache-volume ./.cache/huggingface:/data/huggingface

x-gpu-reservation: &gpu-reservation
    deploy:
        resources:
            reservations:
                devices:
                    - driver: nvidia
                      count: 1
                      capabilities: [ gpu ]

networks:
    rag-net:
        driver: bridge

volumes:
    qdrant_storage:
    open-webui:

services:

    # ── Vector store ─────────────────────────────────────────────────────────────
    qdrant:
        image: qdrant/qdrant:v1.17.1
        hostname: qdrant
        ports:
            - "6333:6333"
            - "6334:6334"
        volumes:
            - qdrant_storage:/qdrant/storage
        networks:
            - rag-net
        healthcheck:
            test: [ "CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    # ── Embedding / rerank inference (hot-reload via bind mount) ─────────────────
    inference:
        <<: *gpu-reservation
        build:
            context: .
            dockerfile: infra/docker/app.gpu.Dockerfile
        hostname: inference
        ports:
            - "8001:8001"
        environment:
            HF_TOKEN: ${HF_TOKEN}
            PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
            <<: *hf-cache-env
        volumes:
            - *hf-cache-volume
            - ./services/inference:/app/services/inference
        command: uvicorn services.inference.inference_app:app --host 0.0.0.0 --port 8001 --reload
        networks:
            - rag-net
        healthcheck:
            test:
                [
                    "CMD", "python", "-c",
                    "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
                ]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 120s

    # ── LLM backend ──────────────────────────────────────────────────────────────
    llm:
        <<: *gpu-reservation
        image: vllm/vllm-openai:v0.18.0-x86_64-cu130
        hostname: llm
        ipc: host
        ports:
            - "8004:8004"
        environment:
            HF_TOKEN: ${HF_TOKEN}
            VLLM_WORKER_MULTIPROC_METHOD: spawn
        volumes:
            - *hf-cache-volume
        command:
            - --host
            - "0.0.0.0"
            - --port
            - "8004"
            - --model
            - ${LLM__MODEL}
            - --served-model-name
            - ${LLM__MODEL}
            - --gpu-memory-utilization
            - ${VLLM__GPU_MEMORY_UTILIZATION:-0.75}
            - --dtype
            - ${VLLM__DTYPE:-half}
            - --max-model-len
            - ${VLLM__MAX_MODEL_LEN:-4096}
            - --max-num-batched-tokens
            - ${VLLM__MAX_NUM_BATCHED_TOKENS:-2048}
            - --max-num-seqs
            - ${VLLM__MAX_NUM_SEQS:-4}
            - --kv-cache-dtype
            - ${VLLM__KV_CACHE_DTYPE:-auto}
            - --enable-prefix-caching
            - --quantization
            - ${VLLM__QUANTIZATION:-compressed-tensors}
        networks:
            - rag-net
        healthcheck:
            test: [ "CMD", "curl", "-fsS", "http://localhost:8004/health" ]
            interval: 20s
            timeout: 10s
            retries: 5
            start_period: 240s

    # ── RAG orchestrator (hot-reload via bind mount) ──────────────────────────────
    orchestrator:
        build:
            context: .
            dockerfile: infra/docker/app.cpu.Dockerfile
        hostname: orchestrator
        ports:
            - "8000:8000"
        env_file:
            - .env
        volumes:
            - ./api:/app/api
        command: uvicorn orchestrator.main:app --host 0.0.0.0 --port 8000 --reload
        networks:
            - rag-net
        depends_on:
            qdrant:
                condition: service_healthy
            inference:
                condition: service_healthy
            llm:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD", "python", "-c",
                    "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 15s

    # ── Chat UI ───────────────────────────────────────────────────────────────────
    webui:
        image: ghcr.io/open-webui/open-webui:v0.8.10
        hostname: webui
        ports:
            - "8080:8080"
        environment:
            OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-http://orchestrator:8000/v1}
            OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy}
            ENABLE_RAG_WEB_SEARCH: "false"
            ENABLE_IMAGE_GENERATION: "false"
            ENABLE_AUDIO: "false"
            WEBUI_AUTH: "true"
            ENABLE_SIGNUP: "true"
            ENABLE_LOGIN_FORM: "true"
            ENABLE_TAGS_GENERATION: "false"
            ENABLE_FOLLOW_UP_GENERATION: "false"
            ENABLE_TITLE_GENERATION: "false"
            DEFAULT_MODELS: ${WEBUI_DEFAULT_MODELS:-Economic-RAG-Assistant}
            WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-admin}
        volumes:
            - open-webui:/app/backend/data
        networks:
            - rag-net
        depends_on:
            orchestrator:
                condition: service_healthy

    # ── Cloudflare tunnel ─────────────────────────────────────────────────────────
    tunnel:
        image: cloudflare/cloudflared:2026.3.0
        hostname: tunnel
        pull_policy: always
        command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
        networks:
            - rag-net
        depends_on:
            - webui
        restart: unless-stopped
