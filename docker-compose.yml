networks:
  rag-net:
    driver: bridge

volumes:
  qdrant_storage:
  open-webui:

services:
  # === Qdrant Vector Database ===
  qdrant:
    image: qdrant/qdrant:${QDRANT_IMAGE_TAG:-v1.17.0}
    hostname: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - rag-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # === Embedding Service (GPU) ===
  embedding:
    build:
      context: ./services/embedding
    hostname: embedding
    ports:
      - "8001:8001"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - EMBEDDING_MODEL=${SERVICES__EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - MAX_SEQ_LENGTH=${SERVICES__MAX_SEQ_LENGTH:-512}
      - ENCODE_BATCH_SIZE=${SERVICES__ENCODE_BATCH_SIZE:-4}
    networks:
      - rag-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  # === Reranker Service (GPU) ===
  reranker:
    build:
      context: ./services/reranker
    hostname: reranker
    ports:
      - "8002:8002"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - RERANKER_MODEL=${SERVICES__RERANKER_MODEL:-Qwen/Qwen3-Reranker-0.6B}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    networks:
      - rag-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  # === Guard Service (GPU) ===
  guard:
    build:
      context: ./services/guard
    hostname: guard
    ports:
      - "8003:8003"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - GUARD_MODEL=${SERVICES__GUARD_MODEL:-Qwen/Qwen3Guard-Gen-0.6B}
      - GUARD_MAX_NEW_TOKENS=${GUARD_MAX_NEW_TOKENS:-64}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    networks:
      - rag-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  # === FastAPI Orchestrator ===
  orchestrator:
    build:
      context: ./api
    hostname: orchestrator
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - rag-net
    depends_on:
      qdrant:
        condition: service_healthy
      embedding:
        condition: service_healthy
      reranker:
        condition: service_healthy
      guard:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # === Open WebUI ===
  webui:
    image: ghcr.io/open-webui/open-webui:${OPEN_WEBUI_IMAGE_TAG:-v0.7.2}
    hostname: webui
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-http://orchestrator:8000/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-dummy}
      - ENABLE_RAG_WEB_SEARCH=false
      - ENABLE_IMAGE_GENERATION=false
      - WEBUI_AUTH=${WEBUI_AUTH:-false}
      - DEFAULT_MODELS=multimodal-economic-rag
    volumes:
      - open-webui:/app/backend/data
    networks:
      - rag-net
    depends_on:
      orchestrator:
        condition: service_healthy

  # === Cloudflare Tunnel ===
  tunnel:
    image: cloudflare/cloudflared:${CLOUDFLARED_IMAGE_TAG:-2026.3.0}
    hostname: tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - rag-net
    depends_on:
      - webui
    restart: unless-stopped

  # === Ingestion Script (run manually) ===
  ingest:
    build:
      context: ./scripts
    environment:
      - EMBEDDING_URL=http://embedding:8001
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-econ_vn_news}
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    networks:
      - rag-net
    depends_on:
      qdrant:
        condition: service_healthy
      embedding:
        condition: service_healthy
    profiles:
      - ingest

  # === ASR Service (GPU, on-demand loading) ===
  asr:
    build:
      context: ./services/asr
    hostname: asr
    ports:
      - "8005:8005"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - ASR_MODEL=${SERVICES__ASR_MODEL:-Qwen/Qwen3-ASR-1.7B}
      - ASR_MAX_DURATION_S=${SERVICES__ASR_MAX_DURATION_S:-60}
      - ASR_IDLE_TIMEOUT=${SERVICES__ASR_IDLE_TIMEOUT:-300}
    networks:
      - rag-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - audio

  # === TTS Service (GPU, on-demand loading) ===
  tts:
    build:
      context: ./services/tts
    hostname: tts
    ports:
      - "8006:8006"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - TTS_MODEL=${SERVICES__TTS_MODEL:-pnnbao-ump/VieNeu-TTS}
      - TTS_IDLE_TIMEOUT=${SERVICES__TTS_IDLE_TIMEOUT:-300}
      - TTS_SAMPLE_RATE=${SERVICES__TTS_SAMPLE_RATE:-24000}
      - TTS_SPEED=${SERVICES__TTS_SPEED:-1.0}
    networks:
      - rag-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - audio
