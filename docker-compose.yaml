x-hf-cache-env: &hf-cache-env
    HF_HOME: /data/huggingface
    HUGGINGFACE_HUB_CACHE: /data/huggingface/hub

x-gpu-reservation: &gpu-reservation
    deploy:
        resources:
            reservations:
                devices:
                    - driver: nvidia
                      count: 1
                      capabilities: [ gpu ]

networks:
    rag-net:
        driver: bridge

volumes:
    hf_cache:
    qdrant_storage:
    open-webui:

services:

    qdrant:
        image: qdrant/qdrant:v1.17.1
        hostname: qdrant
        pull_policy: always
        ports:
            - "6333:6333"
            - "6334:6334"
        volumes:
            - qdrant_storage:/qdrant/storage
        networks:
            - rag-net
        healthcheck:
            test: [ "CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    inference:
        <<: *gpu-reservation
        image: ${DOCKERHUB_NAMESPACE:?set
            DOCKERHUB_NAMESPACE}/eco-rag-inference:${IMAGE_TAG:-latest}
        hostname: inference
        pull_policy: always
        ports:
            - "8001:8001"
        environment:
            HF_TOKEN: ${HF_TOKEN}
            HF_HUB_ETAG_TIMEOUT: ${HF_HUB_ETAG_TIMEOUT:-120}
            HF_HUB_DOWNLOAD_TIMEOUT: ${HF_HUB_DOWNLOAD_TIMEOUT:-120}
            PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
            <<: *hf-cache-env
        volumes:
            - hf_cache:/data/huggingface
        command: uvicorn services.inference.inference_app:app --host 0.0.0.0 --port 8001
        networks:
            - rag-net
        restart: unless-stopped
        healthcheck:
            test:
                [
                    "CMD",
                    "python3",
                    "-c",
                    "import urllib.request;
                      urllib.request.urlopen('http://localhost:8001/health').re\
                      ad()",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 300s

    orchestrator:
        image: ${DOCKERHUB_NAMESPACE:?set
            DOCKERHUB_NAMESPACE}/eco-rag-orchestrator:${IMAGE_TAG:-latest}
        hostname: orchestrator
        pull_policy: always
        ports:
            - "8000:8000"
        env_file:
            - .env
        command: uvicorn orchestrator.main:app --host 0.0.0.0 --port 8000
        networks:
            - rag-net
        restart: unless-stopped
        depends_on:
            qdrant:
                condition: service_healthy
            inference:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD",
                    "python3",
                    "-c",
                    "import urllib.request;
                      urllib.request.urlopen('http://localhost:8000/health').re\
                      ad()",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 15s

    webui:
        image: ghcr.io/open-webui/open-webui:v0.8.10
        hostname: webui
        pull_policy: always
        ports:
            - "8080:8080"
        environment:
            OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-http://orchestrator:8000/v1}
            OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy}
            ENABLE_RAG_WEB_SEARCH: "false"
            ENABLE_IMAGE_GENERATION: "false"
            ENABLE_AUDIO: "false"
            WEBUI_AUTH: "true"
            ENABLE_SIGNUP: "true"
            ENABLE_LOGIN_FORM: "true"
            ENABLE_TAGS_GENERATION: "false"
            ENABLE_FOLLOW_UP_GENERATION: "false"
            ENABLE_TITLE_GENERATION: "false"
            DEFAULT_MODELS: ${WEBUI_DEFAULT_MODELS:-Economic-RAG-Assistant}
            WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-admin}
        volumes:
            - open-webui:/app/backend/data
        networks:
            - rag-net
        restart: unless-stopped
        depends_on:
            orchestrator:
                condition: service_healthy

    tunnel:
        image: cloudflare/cloudflared:2026.3.0
        hostname: tunnel
        pull_policy: always
        command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
        networks:
            - rag-net
        restart: unless-stopped
        depends_on:
            - webui
